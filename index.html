<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Papa Louie 2</title>

<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

<style>
body{
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    overflow:hidden;
}

#container{
    width:100vw;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}
</style>
</head>

<body>

<div id="container">
    <div id="game"></div>
</div>

<script>
window.RufflePlayer = window.RufflePlayer || {};
window.addEventListener("DOMContentLoaded", () => {
    const ruffle = window.RufflePlayer.newest();
    const player = ruffle.createPlayer();
    document.getElementById("game").appendChild(player);

    // resolução ORIGINAL do jogo (não mudar)
    const gameWidth = 800;
    const gameHeight = 600;

    // calcula escala ideal para caber na tela inteira
    const scale = Math.min(
        window.innerWidth / gameWidth,
        window.innerHeight / gameHeight
    );

    player.style.width = gameWidth + "px";
    player.style.height = gameHeight + "px";
    player.style.transform = `scale(${scale})`;
    player.style.transformOrigin = "center";

    player.load("PapaLouie2.swf");
});
</script>

</body>
</html>
