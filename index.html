<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Papa Louie Portal</title>

<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* MENU */
#menu{
    text-align:center;
}

button{
    display:block;
    width:260px;
    margin:15px auto;
    padding:15px;
    font-size:18px;
    background:#ffb300;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#ff9800;
}

/* JOGO */
#gameContainer{
    display:none;
    width:100vw;
    height:100vh;
    justify-content:center;
    align-items:center;
    background:black;
}
</style>
</head>

<body>

<!-- MENU INICIAL -->
<div id="menu">
    <h1>Papa Louie Portal 🍔</h1>
    <button onclick="startGame('PapaLouie2.swf')">Papa Louie 2</button>
    <button onclick="startGame('PapaLouie3.swf')">Papa Louie 3</button>
</div>

<!-- AREA DO JOGO -->
<div id="gameContainer">
    <div id="game"></div>
</div>

<script>
function startGame(file){

    document.getElementById("menu").style.display = "none";
    document.getElementById("gameContainer").style.display = "flex";

    const ruffle = window.RufflePlayer.newest();
    const player = ruffle.createPlayer();
    document.getElementById("game").appendChild(player);

    const gameWidth = 800;
    const gameHeight = 600;

    const scale = Math.min(
        window.innerWidth / gameWidth,
        window.innerHeight / gameHeight
    );

    player.style.width = gameWidth + "px";
    player.style.height = gameHeight + "px";
    player.style.transform = `scale(${scale})`;
    player.style.transformOrigin = "center";

    player.load(file);
}
</script>

</body>
</html>
