<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Papa Louie - Portal</title>

<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

<style>
body{
    margin:0;
    background:#010924;
    color:black;
    font-family:Arial, Helvetica, sans-serif;
}

/* MENU */
#menu{
    text-align:center;
    padding-top:40px;
}

.games{
    display:flex;
    justify-content:center;
    gap:40px;
    margin-top:30px;
}

.card{
    background:#25399c;
    padding:15px;
    border-radius:15px;
    width:220px;
}

.card img{
    width:100%;
    border-radius:10px;
}

.card button{
    width:100%;
    margin-top:10px;
    padding:10px;
    font-size:16px;
    background:#239e2f;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

/* JOGO */
#gameContainer{
    display:none;
    width:100vw;
    height:100vh;
    justify-content:center;
    align-items:center;
    background:black;
    position:relative;
}

#backBtn{
    position:absolute;
    top:15px;
    left:15px;
    padding:10px 15px;
    font-size:16px;
    background:#1a1a1a;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu">
    <h1>Selecione um Jogo</h1>

    <div class="games">

        <div class="card">
            <img src="pl2.jpg">
            <button onclick="startGame('PapaLouie2.swf')">Jogar2</button>
        </div>

        <div class="card">
            <img src="pl3.jpg">
            <button onclick="startGame('PapaLouie3.swf')">Jogar</button>
        </div>

    </div>
</div>

<!-- AREA DO JOGO -->
<div id="gameContainer">
    <button id="backBtn" onclick="goBack()">⬅ Voltar</button>
    <div id="game"></div>
</div>

<script>
let player;

function startGame(file){
    document.getElementById("menu").style.display = "none";
    document.getElementById("gameContainer").style.display = "flex";

    const ruffle = window.RufflePlayer.newest();
    player = ruffle.createPlayer();
    document.getElementById("game").appendChild(player);

    const gameWidth = 800;
    const gameHeight = 600;

    const scale = Math.min(
        window.innerWidth / gameWidth,
        window.innerHeight / gameHeight
    );

    player.style.width = gameWidth + "px";
    player.style.height = gameHeight + "px";
    player.style.transform = `scale(${scale})`;
    player.style.transformOrigin = "center";

    player.load(file);
}

function goBack(){
    location.reload(); // volta pro menu limpando o jogo
}
</script>

</body>
</html>
