<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Papa Louie 2 PT-BR</title>

<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

<style>
body{
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}
</style>

</head>

<body>

<div id="game"></div>

<script>
window.RufflePlayer = window.RufflePlayer || {};
window.addEventListener("DOMContentLoaded", () => {
    const ruffle = window.RufflePlayer.newest();
    const player = ruffle.createPlayer();
    document.getElementById("game").appendChild(player);
    player.style.width = "800px";
    player.style.height = "600px";
    player.load("PapaLouie2.swf");

    // Tradução automática
    const traducoes = {
        "PLAY": "JOGAR",
        "NEW GAME": "NOVO JOGO",
        "CONTINUE": "CONTINUAR",
        "PAUSE": "PAUSA",
        "DAY": "DIA",
        "CUSTOMER": "CLIENTE",
        "SHOP": "LOJA",
        "MAP": "MAPA"
    };

    setInterval(() => {
        document.querySelectorAll("*").forEach(el => {
            if(traducoes[el.innerText]){
                el.innerText = traducoes[el.innerText];
            }
        });
    }, 1000);
});
</script>

</body>
</html>
